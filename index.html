<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino AI Web - Pro Version</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #2c3e50;
            font-family: Arial, sans-serif;
            margin-top: 20px;
            color: white;
        }
        canvas {
            border: 4px solid #ecf0f1;
            background-color: #000;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.5);
            border-radius: 8px;
        }
        #videoElement {
            display: none; 
        }
        .loading {
            color: #f1c40f;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>
</head>
<body>

    <h2 id="statusText" class="loading">Đang tải Camera & AI... (Có thể mất 10-20 giây)</h2>
    
    <video id="videoElement" autoplay playsinline></video>
    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const videoElement = document.getElementById('videoElement');
        const statusText = document.getElementById('statusText');

        // --- 1. TẢI HÌNH ẢNH (Đã sửa background.jpg) ---
        const bgImg = new Image(); bgImg.src = 'background.jpg';
        const robotImg = new Image(); robotImg.src = 'robot.png';
        const spikeImg = new Image(); spikeImg.src = 'spike.png';

        // --- 2. CẤU HÌNH GAME ---
        let gameState = resetGame();
        let currentGesture = "None";
        let isSegReady = false; // Biến kiểm tra AI xóa phông đã sẵn sàng chưa

        function resetGame() {
            return {
                bg_x: 0,
                x_velocity: 5,
                y_velocity: 8,
                robot_x: 50,
                robot_y: 230,
                robot_size: 50,
                spike_x: 800,
                spike_y: 230,
                spike_size: 40,
                score: 0,
                pausing: false,
                jump: false
            };
        }

        // --- 3. KHỞI TẠO AI: HANDS & SELFIE SEGMENTATION ---
        const segCanvas = document.createElement('canvas');
        segCanvas.width = 320;
        segCanvas.height = 240;
        const segCtx = segCanvas.getContext('2d');

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.5 });

        const selfieSegmentation = new SelfieSegmentation({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`});
        selfieSegmentation.setOptions({ modelSelection: 1 });

        // Xử lý tay
        hands.onResults((results) => {
            currentGesture = "None";
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                let fingers = [];
                if (landmarks[8].y < landmarks[6].y) fingers.push(1); else fingers.push(0);
                if (landmarks[12].y < landmarks[10].y) fingers.push(1); else fingers.push(0);
                if (landmarks[16].y < landmarks[14].y) fingers.push(1); else fingers.push(0);
                if (landmarks[20].y < landmarks[18].y) fingers.push(1); else fingers.push(0);
                
                let totalFingers = fingers.filter(f => f === 1).length;
                if (totalFingers === 0) currentGesture = "ROCK";
                else if (totalFingers >= 3) currentGesture = "PAPER";
            }

            if (currentGesture === "ROCK" && !gameState.pausing && gameState.robot_y === 230) gameState.jump = true;
            if (currentGesture === "PAPER" && gameState.pausing) gameState = resetGame();
        });

        // Xử lý xóa phông
        selfieSegmentation.onResults((results) => {
            isSegReady = true;
            statusText.innerText = "AI Đã Sẵn Sàng! Nắm tay (Nhảy) - Xòe tay (Chơi lại)";
            statusText.style.color = "#2ecc71";

            segCtx.clearRect(0, 0, segCanvas.width, segCanvas.height);
            segCtx.globalCompositeOperation = 'source-over';
            segCtx.drawImage(results.segmentationMask, 0, 0, segCanvas.width, segCanvas.height);
            segCtx.globalCompositeOperation = 'source-in';
            segCtx.drawImage(results.image, 0, 0, segCanvas.width, segCanvas.height);
        });

        // Bật Camera và nạp ảnh song song để không bị nghẽn
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                try {
                    await Promise.all([
                        hands.send({image: videoElement}),
                        selfieSegmentation.send({image: videoElement})
                    ]);
                } catch (error) {
                    console.log("AI Loading..."); // Tránh báo lỗi làm treo game
                }
            },
            width: 320,
            height: 240
        });
        camera.start();

        // --- 4. VÒNG LẶP GAME ---
        function gameLoop() {
            if (!gameState.pausing) {
                gameState.bg_x -= (gameState.x_velocity / 2); 
                if (gameState.bg_x <= -800) gameState.bg_x = 0;

                gameState.spike_x -= gameState.x_velocity;
                if (gameState.spike_x <= -50) {
                    gameState.spike_x = 850;
                    gameState.score += 1;
                }

                if (gameState.robot_y <= 230 && gameState.robot_y >= 80) {
                    if (gameState.jump) gameState.robot_y -= gameState.y_velocity;
                } else {
                    gameState.jump = false;
                }

                if (gameState.robot_y < 230 && !gameState.jump) {
                    gameState.robot_y += gameState.y_velocity;
                }
                if (gameState.robot_y > 230) gameState.robot_y = 230;

                let rHitX = gameState.robot_x + 10, rHitY = gameState.robot_y + 10, rHitW = gameState.robot_size - 20, rHitH = gameState.robot_size - 20;
                let sHitX = gameState.spike_x + 10, sHitY = gameState.spike_y + 10, sHitW = gameState.spike_size - 20, sHitH = gameState.spike_size - 20;
                if (rHitX < sHitX + sHitW && rHitX + rHitW > sHitX && rHitY < sHitY + sHitH && rHitY + rHitH > sHitY) gameState.pausing = true;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Vẽ Nền
            if (bgImg.complete && bgImg.naturalHeight !== 0) {
                ctx.drawImage(bgImg, gameState.bg_x, 0, 800, 400);
                ctx.drawImage(bgImg, gameState.bg_x + 800, 0, 800, 400);
            } else {
                ctx.fillStyle = '#e0e0e0'; ctx.fillRect(0, 0, 800, 400);
            }

            // Vẽ Spike
            if (spikeImg.complete && spikeImg.naturalHeight !== 0) ctx.drawImage(spikeImg, gameState.spike_x, gameState.spike_y, gameState.spike_size, gameState.spike_size);
            else { ctx.fillStyle = 'red'; ctx.fillRect(gameState.spike_x, gameState.spike_y, gameState.spike_size, gameState.spike_size); }

            // Vẽ Robot
            if (robotImg.complete && robotImg.naturalHeight !== 0) ctx.drawImage(robotImg, gameState.robot_x, gameState.robot_y, gameState.robot_size, gameState.robot_size);
            else { ctx.fillStyle = 'blue'; ctx.fillRect(gameState.robot_x, gameState.robot_y, gameState.robot_size, gameState.robot_size); }

            ctx.fillStyle = 'white'; ctx.font = 'bold 24px Arial'; ctx.fillText(`Điểm: ${gameState.score}`, 20, 40);
            ctx.fillStyle = '#2ecc71'; ctx.fillText(`Cử chỉ AI: ${currentGesture}`, 20, 70);

            if (gameState.pausing) {
                ctx.fillStyle = 'red'; ctx.font = 'bold 40px Arial'; ctx.fillText('GAME OVER', canvas.width/2 - 120, canvas.height/2 - 20);
                ctx.font = '24px Arial'; ctx.fillText('Xòe tay (PAPER) để chơi lại', canvas.width/2 - 140, canvas.height/2 + 20);
            }

            // --- VẼ CAMERA GÓC PHẢI ---
            ctx.save();
            ctx.scale(-1, 1);
            if (isSegReady) {
                // Nếu AI xóa phông đã xong -> Vẽ ảnh trong suốt
                ctx.drawImage(segCanvas, -canvas.width + 10, 10, 200, 150);
            } else if (videoElement.readyState === 4) {
                // Nếu AI chưa xong -> Vẽ tạm camera gốc có nền để ko bị đen màn hình
                ctx.drawImage(videoElement, -canvas.width + 10, 10, 200, 150);
            }
            ctx.restore();
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)'; ctx.lineWidth = 2;
            ctx.strokeRect(canvas.width - 210, 10, 200, 150); 

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
